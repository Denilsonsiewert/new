<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Avançado - Data Matrix</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  font-size: 14px;
  cursor: pointer;
}

#video, #reader {
  width: 100%;
  max-width: 500px;
  margin-top: 10px;
}

#result {
  font-size: 18px;
  margin-top: 15px;
  font-weight: bold;
  color: #333;
}
</style>
</head>
<body>

<h2>Comparador de Bibliotecas - Data Matrix</h2>

<button onclick="startZXing()">1 - ZXing</button>
<button onclick="startHtml5()">2 - html5-qrcode</button>
<button onclick="startQuagga()">3 - Quagga2</button>
<button onclick="uploadImage()">4 - jsDataMatrix (Imagem)</button>
<button onclick="stopAll()">Parar</button>

<div id="reader"></div>
<video id="video" autoplay playsinline></video>
<input type="file" id="fileInput" style="display:none">

<div id="result">Resultado aparecerá aqui...</div>

<!-- ZXing -->
<script src="https://unpkg.com/@zxing/browser@latest"></script>

<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Quagga -->
<script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>

<!-- jsdatamatrix -->
<script src="https://unpkg.com/jsdatamatrix/dist/index.min.js"></script>

<script>

let zxingReader;
let html5Qr;
let quaggaRunning = false;

/* ========================= */
function stopAll() {

  document.getElementById("result").innerText = "Scanner parado.";

  if (zxingReader) {
    zxingReader.reset();
  }

  if (html5Qr) {
    html5Qr.stop().catch(()=>{});
  }

  if (quaggaRunning) {
    Quagga.stop();
    quaggaRunning = false;
  }

  let video = document.getElementById("video");
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
    video.srcObject = null;
  }

  document.getElementById("reader").innerHTML = "";
}

/* ========================= */
/* 1️⃣ ZXing */
function startZXing() {

  stopAll();
  document.getElementById("result").innerText = "Iniciando ZXing...";

  zxingReader = new ZXing.BrowserMultiFormatReader();

  zxingReader.decodeFromVideoDevice(null, 'video', (result, err) => {
    if (result) {
      document.getElementById("result").innerText = "ZXing: " + result.text;
    }
  });
}

/* ========================= */
/* 2️⃣ html5-qrcode */
function startHtml5() {

  stopAll();
  document.getElementById("video").style.display = "none";
  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      document.getElementById("result").innerText = "HTML5: " + decodedText;
    }
  );
}

/* ========================= */
/* 3️⃣ Quagga */
function startQuagga() {

  stopAll();
  document.getElementById("result").innerText = "Iniciando Quagga...";

  Quagga.init({
    inputStream: {
      type: "LiveStream",
      constraints: { facingMode: "environment" }
    },
    decoder: {
      readers: ["datamatrix_reader"]
    }
  }, function(err) {
    if (err) {
      console.log(err);
      return;
    }
    Quagga.start();
    quaggaRunning = true;
  });

  Quagga.onDetected(data => {
    document.getElementById("result").innerText =
      "Quagga: " + data.codeResult.code;
  });
}

/* ========================= */
/* 4️⃣ jsDataMatrix (Imagem) */
function uploadImage() {

  stopAll();
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = function() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const result = jsdatamatrix.decode(imageData);

    document.getElementById("result").innerText =
      "Imagem: " + (result || "Não detectado");
  };

});

</script>

</body>
</html>
