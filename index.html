<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Gestão de Estoque Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" defer></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f4f6f9;
}

#reader-container{
max-width:600px;
margin:auto;
position:relative;
}

#reader{
width:100%;
border-radius:16px;
overflow:hidden;
border:3px solid #777;
background:#000;
}

#reader.scanning-active{
border-color:#28a745;
box-shadow:0 0 0 2px rgba(40,167,69,.25);
}

.camera-controls-module{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
padding:10px 14px;
border-radius:14px;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
}

.control-btn{
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,255,.2);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

.control-btn.active{
background:#0d6efd;
}

.zoom-control{
display:flex;
align-items:center;
gap:6px;
color:white;
}

.zoom-control input{
width:120px;
}

.tap-focus-dot{
position:absolute;
width:20px;
height:20px;
border:2px solid white;
border-radius:50%;
display:none;
pointer-events:none;
}
</style>
</head>

<body>

<div id="reader-container">

<div id="reader"></div>

<div class="camera-controls-module">

<div id="btnFlash" class="control-btn" onclick="toggleFlash()">🔦</div>

<div class="zoom-control">
🔍
<input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="setZoom(this.value)">
</div>

</div>

<div id="tapDot" class="tap-focus-dot"></div>

</div>

<script>

let html5QrCode
let currentTrack
let imageCapture=null
let flashOn=false
let qrCodeCompleto=null
let focusIntervalId=null

function beep(){
const ctx=new(window.AudioContext||window.webkitAudioContext)()
const osc=ctx.createOscillator()
const gain=ctx.createGain()

osc.frequency.value=1200
gain.gain.value=.3

osc.connect(gain)
gain.connect(ctx.destination)

osc.start()

setTimeout(()=>{
osc.stop()
ctx.close()
},120)
}


async function startScanner(){

html5QrCode=new Html5Qrcode("reader")

const config={
fps:40,
qrbox:{width:260,height:260},
disableFlip:true,
formatsToSupport:[
Html5QrcodeSupportedFormats.DATA_MATRIX,
Html5QrcodeSupportedFormats.QR_CODE
],
experimentalFeatures:{
useBarCodeDetectorIfSupported:true
}
}

await html5QrCode.start(
{facingMode:"environment"},
config,
onScanSuccess
)

document.getElementById("reader").classList.add("scanning-active")

const video=document.querySelector("#reader video")

currentTrack=video.srcObject.getVideoTracks()[0]

setupAutofocusLoop()
setupImageCapture()
setupZoom()
attachTapFocus(video)

}



function onScanSuccess(decodedText){

if(qrCodeCompleto)return

qrCodeCompleto=decodedText

beep()

if(navigator.vibrate)navigator.vibrate(150)

console.log("Código:",decodedText)

}


function setupAutofocusLoop(){

if(!currentTrack?.applyConstraints)return

currentTrack.applyConstraints({
advanced:[{focusMode:"continuous"}]
})

focusIntervalId=setInterval(()=>{
currentTrack.applyConstraints({
advanced:[{focusMode:"continuous"}]
}).catch(()=>{})
},600)

}



function setupImageCapture(){

try{

if(!('ImageCapture'in window))return

imageCapture=new ImageCapture(currentTrack)

imageCapture.getPhotoCapabilities().then(caps=>{
if(caps.focusMode){
imageCapture.setOptions({focusMode:"continuous"})
}
})

}catch{}

}



function attachTapFocus(video){

const container=document.getElementById("reader-container")
const dot=document.getElementById("tapDot")

container.onclick=async(e)=>{

const rect=video.getBoundingClientRect()

const x=(e.clientX-rect.left)/rect.width
const y=(e.clientY-rect.top)/rect.height

dot.style.left=(e.clientX-rect.left)+"px"
dot.style.top=(e.clientY-rect.top)+"px"
dot.style.display="block"

setTimeout(()=>dot.style.display="none",500)

try{

await imageCapture.setOptions({
pointsOfInterest:[{x,y}]
})

await imageCapture.setOptions({
focusMode:"single-shot"
})

setTimeout(()=>{
imageCapture.setOptions({focusMode:"continuous"})
},200)

}catch{}

}

}



function setupZoom(){

if(!currentTrack)return

const slider=document.getElementById("zoomSlider")

const caps=currentTrack.getCapabilities()

if(!caps.zoom)return

slider.min=caps.zoom.min
slider.max=caps.zoom.max
slider.step=caps.zoom.step||0.1

const zoomInicial = caps.zoom.min + ((caps.zoom.max - caps.zoom.min) * 0.35)

slider.value=zoomInicial

currentTrack.applyConstraints({
advanced:[{zoom:zoomInicial}]
})

}



async function setZoom(value){

if(!currentTrack)return

await currentTrack.applyConstraints({
advanced:[{zoom:parseFloat(value)}]
})

}



async function toggleFlash(){

if(!currentTrack)return

const caps=currentTrack.getCapabilities()

if(!caps.torch){
alert("Lanterna não suportada")
return
}

flashOn=!flashOn

document.getElementById("btnFlash").classList.toggle("active")

await currentTrack.applyConstraints({
advanced:[{torch:flashOn}]
})

}



window.onload=startScanner

</script>

</body>
</html>
