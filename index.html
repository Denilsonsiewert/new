<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Leitor Data Matrix Exclusivo</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { padding: 15px; text-align: center; background: #000; z-index: 10; }
    h1 { margin: 0; font-size: 1.2rem; color: #00d2ff; }
    
    #scanner-container {
      position: relative; width: 100%; flex: 1; 
      display: flex; justify-content: center; align-items: center;
      background: #000; overflow: hidden;
    }
    
    #reader { width: 100%; height: 100%; object-fit: cover; }
    
    /* Máscara para focar apenas no centro (evita ler código de barras lateral) */
    .scan-mask {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.7); /* Escurece tudo exceto o buraco */
      pointer-events: none;
      z-index: 5;
    }
    
    /* O "buraco" onde a câmera vê */
    .scan-hole {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 220px; height: 220px;
      border: 4px solid #00d2ff;
      border-radius: 12px;
      box-shadow: 0 0 20px #00d2ff;
      background: transparent;
    }

    .controls {
      position: absolute; bottom: 30px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 20px; z-index: 20;
    }
    
    button {
      background: rgba(255,255,255,0.2); border: 1px solid white;
      color: white; padding: 12px 24px; border-radius: 30px;
      font-size: 1rem; backdrop-filter: blur(5px); cursor: pointer;
    }
    button:active { background: #00d2ff; color: black; }

    #status {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px;
      font-size: 0.9rem; z-index: 20; pointer-events: none;
      border: 1px solid #00d2ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Leitor Data Matrix (Macro)</h1>
  </header>

  <div id="scanner-container">
    <div class="scan-mask">
      <div class="scan-hole"></div>
    </div>
    <div id="status">Aguardando...</div>
    <div id="reader"></div>
    
    <div class="controls">
      <button onclick="toggleTorch()">🔦 Luz</button>
      <button onclick="forceMacroFocus()">🎯 Foco Macro</button>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let videoTrack = null;
    let isScanning = false;
    let lastScan = 0;

    // Configuração CRÍTICA: Apenas Data Matrix
    const formatsToSupport = [
      Html5QrcodeSupportedFormats.DATA_MATRIX
      // NOTE: Não incluímos QR_CODE, CODE_128, EAN_13, etc.
    ];

    async function startScanner() {
      if (isScanning) return;
      
      const readerElement = document.getElementById('reader');
      readerElement.innerHTML = ''; // Limpa anterior
      
      html5QrCode = new Html5Qrcode("reader");
      
      const config = {
        fps: 20, // FPS moderado para não esquentar o dispositivo
        qrbox: { width: 220, height: 220 }, // Área pequena igual à máscara visual
        aspectRatio: 1.0,
        disableFlip: true,
        formatsToSupport: formatsToSupport // FILTRO ESTRITO
      };

      try {
        // Tenta pegar câmeras
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) throw new Error("Nenhuma câmera encontrada");

        // Preferência pela traseira
        const rearCamera = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[0];

        // Inicia o scanner
        await html5QrCode.start(
          { deviceId: { exact: rearCamera.id } }, 
          config, 
          onScanSuccess,
          onScanError
        );

        isScanning = true;
        document.getElementById('status').innerText = "Escaneando (Apenas Data Matrix)";
        
        // Após iniciar, tenta aplicar configurações de hardware
        setTimeout(applyHardwareSettings, 500);

      } catch (err) {
        document.getElementById('status').innerText = "Erro: " + err.message;
        console.error(err);
      }
    }

    // Função Mágica: Força Foco Macro e Desativa outros formatos
    async function applyHardwareSettings() {
      const videoElem = document.querySelector('#reader video');
      if (!videoElem || !videoElem.srcObject) return;
      
      const track = videoElem.srcObject.getVideoTracks()[0];
      videoTrack = track;

      if (!track) return;

      const capabilities = track.getCapabilities ? track.getCapabilities() : {};
      
      console.log("Capacidades da câmera:", capabilities);

      // 1. FORÇAR FOCO MACRO (Distância curta)
      // A maioria dos celulares modernos suporta focusDistance (0.0 a 1.0)
      // Valores baixos (ex: 0.05 a 0.15) são para macro (muito perto)
      if (capabilities.focusDistance) {
        try {
          await track.applyConstraints({
            advanced: [{ 
              focusDistance: 0.10 // Tenta focar a ~10cm (ajuste conforme necessidade)
            }]
          });
          console.log("Foco Macro aplicado com sucesso!");
        } catch (e) {
          console.warn("Falha ao aplicar foco macro manual:", e);
        }
      } else if (capabilities.focusMode) {
        // Fallback para modos de foco se distance não existir
        if (capabilities.focusMode.includes('manual')) {
           await track.applyConstraints({ advanced: [{ focusMode: 'manual' }] });
        }
      }

      // 2. GARANTIR QUE NÃO ESTÁ LENDO CÓDIGO DE BARRAS
      // O filtro 'formatsToSupport' já faz isso no JS, mas alguns dispositivos
      // podem ter aceleradores de hardware. Garantimos que o modo de vídeo
      // não esteja em "documento" ou "texto" que ajuda a ler 1D.
      if (capabilities.exposureMode) {
         // Mantém exposição contínua para não escurecer quando aproxima
         await track.applyConstraints({ advanced: [{ exposureMode: 'continuous' }] });
      }
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();
      if (now - lastScan < 1000) return; // Evita leituras duplas em 1s
      lastScan = now;

      // Vibração e Som
      navigator.vibrate?.(200);
      
      // Feedback Visual
      document.getElementById('status').innerText = "LIDO: " + decodedText.substring(0, 15) + "...";
      document.getElementById('status').style.background = "#00d2ff";
      document.getElementById('status').style.color = "#000";

      // Aqui você envia para seu sistema
      console.log("DADO ENVIADO:", decodedText);
      
      // Opcional: Pausar brevemente após ler
      // html5QrCode.pause(); 
      // setTimeout(() => html5QrCode.resume(), 1000);
    }

    function onScanError(error) {
      // Ignora erros de "não encontrou código", mostra apenas erros reais
      if (error.toString().includes("No code found")) return;
      console.warn("Erro de scan:", error);
    }

    // Botão para forçar re-aplicação do foco macro se o usuário mudar de distância
    async function forceMacroFocus() {
      if (videoTrack) {
        document.getElementById('status').innerText = "Forçando Foco Macro...";
        await applyHardwareSettings();
        setTimeout(() => {
           document.getElementById('status').innerText = "Foco Ajustado";
        }, 1000);
      }
    }

    async function toggleTorch() {
      if (!videoTrack) return;
      const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
      
      if (capabilities.torch) {
        const current = videoTrack.getSettings().torch || false;
        try {
          await videoTrack.applyConstraints({ advanced: [{ torch: !current }] });
        } catch (e) { console.error(e); }
      } else {
        alert("Lanterna não suportada neste dispositivo.");
      }
    }

    // Inicia ao carregar
    window.addEventListener('load', startScanner);
    
    // Recupera se a aba ficar inativa
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && !isScanning) startScanner();
    });

  </script>
</body>
</html>
