<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Data Matrix PRO</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
}

#reader {
  width:100%;
  max-width:500px;
  margin:auto;
}

.controls {
  margin-top:10px;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

input[type=range] {
  width:200px;
}

#result {
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>
<body>

<h2>Scanner Data Matrix Industrial PRO</h2>

<div id="reader"></div>

<div class="controls">
  <button onclick="startScanner()">Iniciar</button>
  <button onclick="stopScanner()">Parar</button>
  <button onclick="toggleFlash()">Lanterna</button>
</div>

<div class="controls">
  Zoom:
  <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" onchange="setZoom(this.value)">
</div>

<div id="result">Aguardando leitura...</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let html5QrCode;
let currentTrack;
let flashOn = false;

async function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  const cameras = await Html5Qrcode.getCameras();
  const cameraId = cameras.find(c => c.label.toLowerCase().includes("back"))?.id || cameras[0].id;

  const config = {
    fps: 30,
    qrbox: { width: 350, height: 350 },
    aspectRatio: 1.0,
    formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX ],
    videoConstraints: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      focusMode: "continuous"
    }
  };

  await html5QrCode.start(
    cameraId,
    config,
    onScanSuccess
  );

  const videoElem = document.querySelector("video");
  currentTrack = videoElem.srcObject.getVideoTracks()[0];

  applyInitialConstraints();
}

function onScanSuccess(decodedText) {
  document.getElementById("result").innerText =
    "Detectado: " + decodedText;
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop();
  }
}

async function applyInitialConstraints() {
  const capabilities = currentTrack.getCapabilities();

  let constraints = {};

  if (capabilities.focusMode) {
    constraints.advanced = [{ focusMode: "continuous" }];
  }

  if (capabilities.zoom) {
    document.getElementById("zoomSlider").max = capabilities.zoom.max;
    document.getElementById("zoomSlider").min = capabilities.zoom.min;
  }

  await currentTrack.applyConstraints(constraints);
}

async function setZoom(value) {
  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();
  if (capabilities.zoom) {
    await currentTrack.applyConstraints({
      advanced: [{ zoom: parseFloat(value) }]
    });
  }
}

async function toggleFlash() {
  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  if (!capabilities.torch) {
    alert("Lanterna não suportada neste dispositivo.");
    return;
  }

  flashOn = !flashOn;

  await currentTrack.applyConstraints({
    advanced: [{ torch: flashOn }]
  });
}

</script>

</body>
</html>
