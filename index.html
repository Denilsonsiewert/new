<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Data Matrix Industrial</title>

<style>
body { font-family: Arial; text-align:center; background:#f2f2f2; }
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
}
#video, #reader { width:100%; max-width:500px; margin-top:10px; }
#result { margin-top:15px; font-weight:bold; font-size:18px; }
</style>
</head>
<body>

<h2>Scanner Data Matrix Industrial</h2>

<button onclick="startNative()">1 - BarcodeDetector (Nativo)</button>
<button onclick="startZXing()">2 - ZXing</button>
<button onclick="startHtml5()">3 - html5-qrcode</button>
<button onclick="startQuagga()">4 - Quagga2</button>
<button onclick="uploadImage()">5 - Testar Imagem</button>
<button onclick="stopAll()">Parar</button>

<video id="video" autoplay playsinline></video>
<div id="reader"></div>
<input type="file" id="fileInput" style="display:none">

<div id="result">Resultado aparecerá aqui</div>

<!-- ZXing -->
<script src="https://unpkg.com/@zxing/browser@latest"></script>

<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Quagga2 fork -->
<script src="https://unpkg.com/@ericblade/quagga2@latest/dist/quagga.min.js"></script>

<script>

let zxingReader;
let html5Qr;
let quaggaRunning = false;
let stream;

/* ================= STOP ================= */
function stopAll(){

  document.getElementById("result").innerText = "Parado.";

  if(zxingReader) zxingReader.reset();
  if(html5Qr) html5Qr.stop().catch(()=>{});
  if(quaggaRunning){ Quagga.stop(); quaggaRunning=false; }

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
}

/* ================= 1 - Native ================= */
async function startNative(){

  stopAll();

  if(!('BarcodeDetector' in window)){
    alert("BarcodeDetector não suportado nesse navegador.");
    return;
  }

  const formats = await BarcodeDetector.getSupportedFormats();
  if(!formats.includes('data_matrix')){
    alert("DataMatrix não suportado nativamente nesse navegador.");
    return;
  }

  const detector = new BarcodeDetector({ formats: ['data_matrix'] });

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  setInterval(async ()=>{
    const barcodes = await detector.detect(video);
    if(barcodes.length>0){
      document.getElementById("result").innerText =
        "Nativo: "+barcodes[0].rawValue;
    }
  },500);
}

/* ================= 2 - ZXing ================= */
function startZXing(){

  stopAll();

  zxingReader = new ZXing.BrowserMultiFormatReader({
    delayBetweenScanAttempts: 100
  });

  zxingReader.decodeFromVideoDevice(null,'video',(result)=>{
    if(result){
      document.getElementById("result").innerText =
        "ZXing: "+result.text;
    }
  });
}

/* ================= 3 - html5 ================= */
function startHtml5(){

  stopAll();

  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode:"environment" },
    {
      fps:15,
      qrbox:{ width:250, height:250 },
      aspectRatio:1.0
    },
    decodedText=>{
      document.getElementById("result").innerText =
        "HTML5: "+decodedText;
    }
  );
}

/* ================= 4 - Quagga2 ================= */
function startQuagga(){

  stopAll();

  Quagga.init({
    inputStream:{
      type:"LiveStream",
      constraints:{ facingMode:"environment" }
    },
    locator:{ patchSize:"large", halfSample:false },
    decoder:{ readers:["datamatrix_reader"] }
  },function(err){

    if(err){
      console.log(err);
      return;
    }

    Quagga.start();
    quaggaRunning=true;
  });

  Quagga.onDetected(data=>{
    document.getElementById("result").innerText =
      "Quagga: "+data.codeResult.code;
  });
}

/* ================= 5 - Upload ================= */
function uploadImage(){
  stopAll();
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function(e){

  const file = e.target.files[0];
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async function(){

    if(!('BarcodeDetector' in window)){
      alert("Teste nativo não suportado.");
      return;
    }

    const detector = new BarcodeDetector({ formats:['data_matrix'] });
    const results = await detector.detect(img);

    if(results.length>0){
      document.getElementById("result").innerText =
        "Imagem: "+results[0].rawValue;
    }else{
      document.getElementById("result").innerText =
        "Nenhum Data Matrix detectado.";
    }
  };
});

</script>
</body>
</html>
