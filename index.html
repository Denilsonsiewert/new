<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Data Matrix ULTRA</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
video, canvas { width:100%; max-width:500px; margin:auto; display:block; }
button { padding:8px 12px; margin:5px; border:none; border-radius:6px; }
#result { margin-top:10px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>Scanner Data Matrix ULTRA Industrial</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div>
  <button onclick="start()">Iniciar</button>
  <button onclick="stop()">Parar</button>
  <button onclick="toggleFlash()">Lanterna</button>
</div>

<div id="result">Aguardando...</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let stream, track;
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let scanning = false;
let flashOn = false;
let autoZoomLevel = 1;

async function start() {

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  document.getElementById("video").srcObject = stream;
  track = stream.getVideoTracks()[0];

  applyAutoFocus();
  applyAutoExposure();

  scanning = true;
  requestAnimationFrame(processFrame);
}

function stop() {
  scanning = false;
  if(stream) stream.getTracks().forEach(t => t.stop());
}

async function toggleFlash() {
  if(!track) return;
  const cap = track.getCapabilities();
  if(!cap.torch) return alert("Lanterna não suportada");
  flashOn = !flashOn;
  await track.applyConstraints({ advanced: [{ torch: flashOn }] });
}

async function applyAutoFocus() {
  const cap = track.getCapabilities();
  if(cap.focusMode) {
    await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
  }
}

async function applyAutoExposure() {
  const cap = track.getCapabilities();
  if(cap.exposureMode) {
    await track.applyConstraints({ advanced: [{ exposureMode: "continuous" }] });
  }
}

async function autoZoom() {
  const cap = track.getCapabilities();
  if(cap.zoom) {
    autoZoomLevel += 0.2;
    if(autoZoomLevel > cap.zoom.max) autoZoomLevel = cap.zoom.max;
    await track.applyConstraints({ advanced: [{ zoom: autoZoomLevel }] });
  }
}

function binarize(imageData) {

  let data = imageData.data;
  let sum = 0;

  for(let i=0;i<data.length;i+=4){
    let gray = (data[i] + data[i+1] + data[i+2]) / 3;
    sum += gray;
  }

  let threshold = sum / (data.length/4);

  for(let i=0;i<data.length;i+=4){
    let gray = (data[i] + data[i+1] + data[i+2]) / 3;
    let value = gray > threshold ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }

  return imageData;
}

async function processFrame() {

  if(!scanning) return;

  let video = document.getElementById("video");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  // Recorte central inteligente
  let size = Math.min(canvas.width, canvas.height) * 0.6;
  let x = (canvas.width - size)/2;
  let y = (canvas.height - size)/2;

  let imageData = ctx.getImageData(x, y, size, size);

  imageData = binarize(imageData);

  ctx.putImageData(imageData, x, y);

  detectContrast(imageData);

  requestAnimationFrame(processFrame);
}

function detectContrast(imageData){

  let data = imageData.data;
  let darkPixels = 0;

  for(let i=0;i<data.length;i+=4){
    if(data[i] < 50) darkPixels++;
  }

  let ratio = darkPixels / (data.length/4);

  if(ratio > 0.3 && ratio < 0.7){
    autoZoom();
  }
}

</script>
</body>
</html>
