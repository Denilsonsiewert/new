<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Data Matrix - Todas Opções Gratuitas</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
video, #reader {
  width:100%;
  max-width:500px;
  margin-top:10px;
}
#result {
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>
<body>

<h2>Scanner Data Matrix Industrial</h2>

<button onclick="startNative()">1 - BarcodeDetector (Nativo)</button>
<button onclick="startZXing()">2 - ZXing Browser</button>
<button onclick="startZXingHard()">3 - ZXing Alta Precisão</button>
<button onclick="startHtml5()">4 - html5-qrcode</button>
<button onclick="startQuagga()">5 - Quagga2</button>
<button onclick="stopAll()">Parar</button>

<video id="video" autoplay playsinline></video>
<div id="reader"></div>

<div id="result">Resultado aparecerá aqui</div>

<!-- ZXing Browser -->
<script src="https://unpkg.com/@zxing/browser@latest"></script>

<!-- ZXing Library -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Quagga2 -->
<script src="https://unpkg.com/@ericblade/quagga2@latest/dist/quagga.min.js"></script>

<script>

let stream;
let zxingReader;
let html5Qr;
let quaggaRunning = false;
let intervalNative;

/* ================= STOP ================= */
function stopAll(){

  document.getElementById("result").innerText = "Parado.";

  if(zxingReader) zxingReader.reset();
  if(html5Qr) html5Qr.stop().catch(()=>{});
  if(quaggaRunning){ Quagga.stop(); quaggaRunning=false; }

  if(intervalNative) clearInterval(intervalNative);

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }

  document.getElementById("reader").innerHTML = "";
}

/* ================= 1 - BarcodeDetector ================= */
async function startNative(){

  stopAll();

  if(!('BarcodeDetector' in window)){
    alert("Não suportado neste navegador.");
    return;
  }

  const formats = await BarcodeDetector.getSupportedFormats();
  if(!formats.includes('data_matrix')){
    alert("DataMatrix não suportado nativamente.");
    return;
  }

  const detector = new BarcodeDetector({ formats:['data_matrix'] });

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", focusMode:"continuous" }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  intervalNative = setInterval(async ()=>{
    const codes = await detector.detect(video);
    if(codes.length>0){
      document.getElementById("result").innerText =
        "Nativo: "+codes[0].rawValue;
    }
  },300);
}

/* ================= 2 - ZXing ================= */
function startZXing(){

  stopAll();

  zxingReader = new ZXing.BrowserMultiFormatReader({
    delayBetweenScanAttempts: 100
  });

  zxingReader.decodeFromVideoDevice(null,'video',(result)=>{
    if(result){
      document.getElementById("result").innerText =
        "ZXing: "+result.text;
    }
  });
}

/* ================= 3 - ZXing Alta Precisão ================= */
function startZXingHard(){

  stopAll();

  const hints = new Map();
  hints.set(ZXingLibrary.DecodeHintType.TRY_HARDER, true);

  const reader = new ZXingLibrary.MultiFormatReader();
  reader.setHints(hints);

  const codeReader = new ZXing.BrowserMultiFormatReader(reader);

  codeReader.decodeFromVideoDevice(null,'video',(result)=>{
    if(result){
      document.getElementById("result").innerText =
        "ZXing Hard: "+result.text;
    }
  });

  zxingReader = codeReader;
}

/* ================= 4 - html5-qrcode ================= */
function startHtml5(){

  stopAll();

  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode:"environment" },
    {
      fps:20,
      qrbox:{ width:300, height:300 },
      aspectRatio:1.0
    },
    text=>{
      document.getElementById("result").innerText =
        "HTML5: "+text;
    }
  );
}

/* ================= 5 - Quagga2 ================= */
function startQuagga(){

  stopAll();

  Quagga.init({
    inputStream:{
      type:"LiveStream",
      constraints:{
        facingMode:"environment",
        width:{ min:640 },
        height:{ min:480 }
      }
    },
    locator:{
      patchSize:"large",
      halfSample:false
    },
    decoder:{
      readers:["datamatrix_reader"]
    }
  },function(err){

    if(err){
      console.log(err);
      return;
    }

    Quagga.start();
    quaggaRunning=true;
  });

  Quagga.onDetected(data=>{
    document.getElementById("result").innerText =
      "Quagga: "+data.codeResult.code;
  });
}

</script>
</body>
</html>
