<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Data Matrix PRO</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
}

#reader {
  width:100%;
  max-width:500px;
  margin:auto;
}

.controls {
  margin-top:10px;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

input[type=range] {
  width:200px;
}

#result {
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  color:#333;
}
</style>
</head>
<body>

<h2>Scanner Data Matrix Industrial PRO</h2>

<div id="reader"></div>

<div class="controls">
  <button onclick="startScanner()">Iniciar</button>
  <button onclick="stopScanner()">Parar</button>
  <button onclick="toggleFlash()">Lanterna</button>
</div>

<div class="controls">
  Zoom:
  <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1"
         onchange="setZoom(this.value)">
</div>

<div id="result">Aguardando leitura...</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

<script>

let html5QrCode = null;
let currentTrack = null;
let flashOn = false;
let lastResult = "";
let lastScanTime = 0;

async function startScanner() {

  try {

    html5QrCode = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      alert("Nenhuma câmera encontrada.");
      return;
    }

    const cameraId =
      cameras.find(c => c.label.toLowerCase().includes("back"))?.id
      || cameras[0].id;

    const config = {
      fps: 35,
      qrbox: { width: 250, height: 250 },
      aspectRatio: 1.0,
      disableFlip: true,
      formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX ]
    };

    await html5QrCode.start(
      cameraId,
      config,
      onScanSuccess,
      onScanFailure
    );

    const videoElem = document.querySelector("#reader video");

    if (videoElem && videoElem.srcObject) {
      currentTrack = videoElem.srcObject.getVideoTracks()[0];
      applyFocusAndZoom();
    }

  } catch (err) {
    console.error(err);
    alert("Erro ao iniciar câmera: " + err);
  }
}

function onScanSuccess(decodedText) {

  const now = Date.now();

  if (decodedText === lastResult && now - lastScanTime < 1000) {
    return;
  }

  lastResult = decodedText;
  lastScanTime = now;

  document.getElementById("result").innerText =
    "Detectado: " + decodedText;
}

function onScanFailure(error) {
  // silencioso para não travar
}

async function stopScanner() {
  if (html5QrCode) {
    await html5QrCode.stop();
    html5QrCode = null;
  }
}

async function applyFocusAndZoom() {

  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  let constraints = { advanced: [] };

  if (capabilities.focusMode) {
    constraints.advanced.push({ focusMode: "continuous" });
  }

  if (capabilities.exposureMode) {
    constraints.advanced.push({ exposureMode: "continuous" });
  }

  if (constraints.advanced.length > 0) {
    await currentTrack.applyConstraints(constraints);
  }

  if (capabilities.zoom) {
    document.getElementById("zoomSlider").max = capabilities.zoom.max;
    document.getElementById("zoomSlider").min = capabilities.zoom.min;
  }
}

async function setZoom(value) {

  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  if (capabilities.zoom) {
    await currentTrack.applyConstraints({
      advanced: [{ zoom: parseFloat(value) }]
    });
  }
}

async function toggleFlash() {

  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  if (!capabilities.torch) {
    alert("Lanterna não suportada neste dispositivo.");
    return;
  }

  flashOn = !flashOn;

  await currentTrack.applyConstraints({
    advanced: [{ torch: flashOn }]
  });
}

</script>

</body>
</html>
