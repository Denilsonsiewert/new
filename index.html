<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Matrix Rápido</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
#reader { width:100%; max-width:500px; margin:auto; }
button { padding:8px 12px; margin:5px; border:none; border-radius:6px; }
#result { margin-top:10px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>Scanner Data Matrix - Rápido</h2>

<div id="reader"></div>

<button onclick="start()">Iniciar</button>
<button onclick="stop()">Parar</button>
<button onclick="toggleFlash()">Lanterna</button>

<br>
Zoom:
<input type="range" id="zoom" min="1" max="3" step="0.1" value="1" onchange="setZoom(this.value)">

<div id="result">Aguardando...</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let html5QrCode;
let currentTrack;
let flashOn = false;

async function start() {

  html5QrCode = new Html5Qrcode("reader");

  const cameras = await Html5Qrcode.getCameras();
  const backCam = cameras.find(c => c.label.toLowerCase().includes("back")) || cameras[0];

  const config = {
    fps: 30, // mais rápido
    qrbox: 300,
    aspectRatio: 1.0,
    formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX ],
    videoConstraints: {
      facingMode: "environment",
      width: { ideal: 1280 }, // 1920 pode deixar lento
      height: { ideal: 720 },
      focusMode: "continuous"
    }
  };

  await html5QrCode.start(
    backCam.id,
    config,
    onSuccess
  );

  const video = document.querySelector("video");
  currentTrack = video.srcObject.getVideoTracks()[0];

  applyFocus();
}

function onSuccess(decodedText) {
  document.getElementById("result").innerText =
    "Detectado: " + decodedText;
}

function stop() {
  if(html5QrCode) html5QrCode.stop();
}

async function applyFocus() {
  const cap = currentTrack.getCapabilities();

  if(cap.focusMode){
    await currentTrack.applyConstraints({
      advanced: [{ focusMode: "continuous" }]
    });
  }

  if(cap.zoom){
    document.getElementById("zoom").max = cap.zoom.max;
    document.getElementById("zoom").min = cap.zoom.min;
  }
}

async function setZoom(val) {
  const cap = currentTrack.getCapabilities();
  if(cap.zoom){
    await currentTrack.applyConstraints({
      advanced: [{ zoom: parseFloat(val) }]
    });
  }
}

async function toggleFlash(){
  const cap = currentTrack.getCapabilities();
  if(!cap.torch) return alert("Lanterna não suportada");

  flashOn = !flashOn;

  await currentTrack.applyConstraints({
    advanced: [{ torch: flashOn }]
  });
}

</script>
</body>
</html>
