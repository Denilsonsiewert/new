<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Gestão de Estoque Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

  <style>
    :root {
      --cor-primaria: #0d6efd;
      --cor-sucesso: #198754;
      --cor-perigo: #dc3545;
      --cor-alerta: #ffc107;
      --cor-vencido: #e74c3c;
      --cor-fundo: #f4f6f9;
      --cor-container: #ffffff;
      --cor-texto: #1f1f1f;
      --cor-texto-claro: #6c757d;
      --borda-cor: #d8dde3;
      --sombra-suave: 0 4px 12px rgba(0,0,0,0.06);
      --sombra-media: 0 6px 18px rgba(0,0,0,0.08);
      --sombra-forte: 0 10px 30px rgba(0,0,0,0.15);
      --altura-nav: 75px;
      --verde: #28a745;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--cor-fundo);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      color: var(--cor-texto);
    }

    .app-main {
      flex-grow: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      padding-bottom: calc(var(--altura-nav) + var(--safe-area-bottom) + 20px);
      display: flex;
      justify-content: center;
      -webkit-overflow-scrolling: touch;
    }

    .content-wrapper {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .app-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--altura-nav) + var(--safe-area-bottom));
      padding-bottom: var(--safe-area-bottom);
      background: #fff;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      border-top: 1px solid var(--borda-cor);
    }

    .nav-link {
      border: none;
      background: none;
      cursor: pointer;
      padding: 8px 4px;
      flex-grow: 1;
      color: var(--cor-texto-claro);
      transition: all 0.2s ease;
      font-weight: 600;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .nav-link .icon { font-size: 1.6rem; transition: transform 0.2s ease; }
    .nav-link.active { color: var(--cor-primaria); }
    .nav-link.active .icon { transform: translateY(-3px); }

    .page { display: none; width: 100%; }
    .page.active { display: block; animation: fadeIn 0.25s ease-out; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: var(--cor-container);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid var(--borda-cor);
      box-shadow: var(--sombra-suave);
      margin-bottom: 20px;
    }

    h2 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cor-texto);
    }

    #reader-container {
      position: relative;
      width: 100%;
      max-width: 450px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 20px;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      border: 4px solid #444;
      box-shadow: var(--sombra-media);
      transition: border-color 0.3s ease;
    }

    #reader-container.scanning-active {
      border-color: var(--verde);
      box-shadow: 0 0 20px rgba(40,167,69,0.3);
    }

    #reader { width: 100%; height: 100%; }
    #reader video { object-fit: cover !important; width: 100%; height: 100%; }

    .camera-controls-module {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      border-radius: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 25;
      min-width: 260px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .control-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 1.3rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .control-btn.active {
      background: var(--cor-primaria);
      border-color: var(--cor-primaria);
      box-shadow: 0 0 10px rgba(13,110,253,0.5);
    }

    .zoom-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .zoom-control input[type="range"] {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      appearance: none;
      outline: none;
    }

    .zoom-control input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .input-group { margin-bottom: 20px; }

    label {
      font-weight: 600;
      color: var(--cor-texto-claro);
      margin-bottom: 8px;
      display: block;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--borda-cor);
      background: #fdfdfd;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 16px;
      font-weight: 700;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: var(--cor-primaria);
      color: white;
      transition: all 0.2s;
      font-size: 1rem;
      box-shadow: 0 4px 6px rgba(13,110,253,0.15);
    }

    button:active { transform: scale(0.97); }
    button.saida { 
      background: var(--cor-perigo);
      box-shadow: 0 4px 6px rgba(220,53,69,0.15);
    }

    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      font-weight: 600;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .status-sucesso { background: #d1e7dd; color: var(--cor-sucesso); display: block; }
    .status-erro    { background: #f8d7da; color: var(--cor-perigo); display: block; }
    .status-info    { background: #d1ecf1; color: #0c5460; display: block; }

    .table-wrapper { 
      overflow-x: auto; 
      border-radius: 12px;
      border: 1px solid var(--borda-cor);
    }

    .styled-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      background: white;
      min-width: 500px;
    }

    .styled-table thead tr {
      background: #f8f9fa;
      color: var(--cor-texto-claro);
      text-align: left;
      border-bottom: 2px solid var(--borda-cor);
    }

    .styled-table th, .styled-table td {
      padding: 14px 16px;
    }

    .styled-table tbody tr {
      border-bottom: 1px solid #eee;
    }

    .alert-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .alert-item {
      padding: 18px;
      border-radius: 16px;
      color: white;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: var(--sombra-suave);
      position: relative;
      overflow: hidden;
    }

    .alert-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 6px; height: 100%;
      background: rgba(0,0,0,0.2);
    }

    .alert-vencido {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }

    .alert-7dias {
      background: linear-gradient(135deg, #f39c12, #e67e22);
    }

    .alert-icon {
      font-size: 2rem;
      background: rgba(255,255,255,0.2);
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .alert-info h4 { margin: 0 0 4px; font-size: 1.1rem; }
    .alert-info p { margin: 0; font-size: 0.9rem; opacity: 0.9; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active { display: flex; }

    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--sombra-forte);
      animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-card .icon { font-size: 4rem; margin-bottom: 15px; }
    .modal-card h3 { color: var(--cor-vencido); margin: 0 0 10px; font-size: 1.6rem; }
    .modal-card p { color: var(--cor-texto-claro); margin-bottom: 25px; line-height: 1.5; }

    .modal-details {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: left;
      font-size: 0.9rem;
      border-left: 4px solid var(--cor-vencido);
    }

    .modal-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-btn {
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn-confirm { background: var(--cor-vencido); color: white; }
    .btn-cancel { background: #eee; color: var(--cor-texto); }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      gap: 15px;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--cor-primaria);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .qr-result {
      text-align: center;
      padding: 16px;
      margin-top: 16px;
      font-weight: 500;
      color: var(--cor-texto);
      background: #f8f9fa;
      border-radius: 10px;
      border: 1px solid var(--borda-cor);
    }

    @media (min-width: 768px) {
      .app-main { padding: 40px; }
      .app-main { padding-bottom: 120px; }
      .nav-link { font-size: 0.9rem; }
      .nav-link .icon { font-size: 1.8rem; }
      .modal-btns { flex-direction: row; }
    }
  </style>
</head>

<body>
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <span style="font-weight: 600;">Iniciando Sistema...</span>
  </div>

  <div id="modal-vencimento" class="modal-overlay">
    <div class="modal-card">
      <div class="icon">🚫</div>
      <h3>Produto Vencido!</h3>
      <p>Este item ultrapassou a data de validade. Deseja realmente dar entrada?</p>
      <div class="modal-details" id="modal-details-content"></div>
      <div class="modal-btns">
        <button class="modal-btn btn-confirm" onclick="confirmarEntradaVencida()">Sim, Confirmar Entrada</button>
        <button class="modal-btn btn-cancel" onclick="cancelarEntradaVencida()">Não, Cancelar</button>
      </div>
    </div>
  </div>

  <nav class="app-nav">
    <button id="nav-registrar" class="nav-link active" onclick="mostrarPagina('registrar')"><span class="icon">📷</span><span>Scanner</span></button>
    <button id="nav-estoque" class="nav-link" onclick="mostrarPagina('estoque')"><span class="icon">📦</span><span>Estoque</span></button>
    <button id="nav-movimentacoes" class="nav-link" onclick="mostrarPagina('movimentacoes')"><span class="icon">📋</span><span>Histórico</span></button>
    <button id="nav-alertas" class="nav-link" onclick="mostrarPagina('alertas')"><span class="icon">⚠️</span><span>Alertas</span></button>
  </nav>

  <main class="app-main">
    <div class="content-wrapper">

      <div id="page-registrar" class="page active">
        <div class="card">
          <h2>Registrar Movimentação</h2>
          
          <div id="reader-container">
            <div id="reader"></div>
            <div class="camera-controls-module">
              <div id="btnFlash" class="control-btn" onclick="toggleFlash()">🔦</div>
              <div class="zoom-control">
                <span>🔍</span>
                <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="setZoom(this.value)" />
              </div>
            </div>
          </div>

          <div id="qr-result" class="qr-result">Aponte para o Data Matrix</div>

          <div class="input-group">
            <label>Quantidade</label>
            <input type="number" id="quantidade" placeholder="Ex: 10" min="1" />
          </div>

          <div class="button-group">
            <button id="btnEntrada" onclick="enviarDados('Entrada')">Entrada</button>
            <button id="btnSaida" class="saida" onclick="enviarDados('Saída')">Saída</button>
          </div>

          <div id="status"></div>
        </div>
      </div>

      <div id="page-estoque" class="page">
        <div class="card">
          <h2>Consulta de Estoque</h2>
          <div class="input-group"><input type="text" onkeyup="filtrarTabela('tabela-estoque', this)" placeholder="🔎 Pesquisar..." /></div>
          <div class="table-wrapper">
            <table id="tabela-estoque" class="styled-table">
              <thead><tr><th>Item</th><th>Lote</th><th>Validade</th><th>Qtd</th></tr></thead>
              <tbody id="corpo-tabela-estoque"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="page-movimentacoes" class="page">
        <div class="card">
          <h2>Histórico</h2>
          <div class="input-group"><input type="text" onkeyup="filtrarTabela('tabela-movimentacoes', this)" placeholder="🔎 Filtrar..." /></div>
          <div class="table-wrapper">
            <table id="tabela-movimentacoes" class="styled-table">
              <thead><tr><th>Data</th><th>Tipo</th><th>Item</th><th>Lote</th><th>Qtd</th></tr></thead>
              <tbody id="corpo-tabela-movimentacoes"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="page-alertas" class="page">
        <div class="card">
          <h2>Alertas Críticos</h2>
          <div id="lista-alertas" class="alert-list"></div>
        </div>
      </div>

    </div>
  </main>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbztT62x-sYOCIuv-CvKbN0rZfeDLa9KMpjoE0sFaqnu_fFs8yDErpwxU80_wJVH3c4tSA/exec';
    const API_TOKEN   = 'sk_ESTOQUE_7vQ2d9A4mX8pL5rB1tC6hN3zY0';

    let html5QrCode = null;
    let currentTrack = null;
    let scannerActive = false;
    let flashOn = false;
    let qrCodeLido = null;
    let focusInterval = null;
    let appData = { estoque: [], alertas: [], movimentacoes: [] };
    let pendente = null;

    async function startScanner() {
      if (scannerActive) return;
      
      const container = document.getElementById('reader-container');
      const result = document.getElementById('qr-result');
      
      result.textContent = 'Iniciando câmera...';
      
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
        try { await html5QrCode.clear(); } catch (e) {}
      }

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 20,
        qrbox: { width: 250, height: 250 },
        formatsToSupport: [Html5QrcodeSupportedFormats.DATA_MATRIX],
        disableFlip: false,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: false
        }
      };

      try {
        await html5QrCode.start(
          { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          config,
          onScanSuccess,
          onScanFailure
        );

        scannerActive = true;
        container.classList.add('scanning-active');
        result.textContent = 'Aguardando Data Matrix...';

        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
          currentTrack = video.srcObject.getVideoTracks()[0];
          setupTurboFocus();
          setupInitialZoom();
        }
      } catch (err) {
        result.textContent = 'Erro ao acessar câmera: ' + err.message;
        console.error('Erro ao iniciar scanner:', err);
      }
    }

    function onScanSuccess(text) {
      if (qrCodeLido) return;
      // Validar que é Data Matrix (formato específico)
      if (!text || text.length < 3) return;
      qrCodeLido = text;
      if (navigator.vibrate) navigator.vibrate(100);
      document.getElementById('qr-result').innerHTML = `<strong>✓ Data Matrix Lido:</strong> ${text}`;
      stopScanner();
    }

    function onScanFailure(error) {
      // Silencioso - não mostra erro a cada frame
    }

    async function stopScanner() {
      if (focusInterval) clearInterval(focusInterval);
      scannerActive = false;
      document.getElementById('reader-container').classList.remove('scanning-active');
      
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
      }
    }

    function setupTurboFocus() {
      if (!currentTrack || !currentTrack.applyConstraints) return;

      let count = 0;
      focusInterval = setInterval(() => {
        if (!scannerActive) return;
        
        count++;
        const mode = (count % 3 === 0) ? "single-shot" : "continuous";
        
        currentTrack.applyConstraints({ advanced: [{ focusMode: mode }] }).catch(() => {});

        if (count % 2 === 0) {
          try {
            const settings = currentTrack.getSettings();
            const z = settings.zoom || 1;
            currentTrack.applyConstraints({ advanced: [{ zoom: z + 0.01 }] }).then(() => {
              setTimeout(() => {
                if (currentTrack) currentTrack.applyConstraints({ advanced: [{ zoom: z }] }).catch(() => {});
              }, 50);
            }).catch(() => {});
          } catch (e) {}
        }
      }, 180);
    }

    async function setupInitialZoom() {
      if (!currentTrack || !currentTrack.getCapabilities) return;

      try {
        const caps = currentTrack.getCapabilities();
        if (caps.zoom) {
          const min = caps.zoom.min || 1;
          const max = caps.zoom.max || 5;
          const initial = min + ((max - min) * 0.3);
          
          await currentTrack.applyConstraints({ advanced: [{ zoom: initial }] });
          
          const slider = document.getElementById('zoomSlider');
          slider.min = min;
          slider.max = max;
          slider.value = initial;
        }
      } catch (e) {}
    }

    async function setZoom(v) {
      if (currentTrack) {
        try {
          await currentTrack.applyConstraints({ advanced: [{ zoom: parseFloat(v) }] });
        } catch (e) {}
      }
    }

    async function toggleFlash() {
      if (!currentTrack) return;
      try {
        flashOn = !flashOn;
        await currentTrack.applyConstraints({ advanced: [{ torch: flashOn }] });
        document.getElementById('btnFlash').classList.toggle('active', flashOn);
      } catch (e) {
        alert('Lanterna não suportada neste dispositivo.');
      }
    }

    async function enviarDados(tipo) {
      const qtd = document.getElementById('quantidade').value;
      if (!qrCodeLido || !qtd || qtd <= 0) {
        mostrarStatus('Erro: Leia o código e informe a quantidade.', 'erro');
        return;
      }

      if (tipo === 'Entrada') {
        const item = appData.estoque.find(i => i.item === qrCodeLido || i.lote === qrCodeLido);
        if (item && isVencido(item.validade)) {
          pendente = { tipo, qtd };
          document.getElementById('modal-details-content').innerHTML = 
            `<strong>Item:</strong> ${item.item}<br><strong>Lote:</strong> ${item.lote}<br><strong>Validade:</strong> ${item.validade}`;
          document.getElementById('modal-vencimento').classList.add('active');
          return;
        }
      }
      
      executarEnvio(tipo, qtd);
    }

    function isVencido(dataStr) {
      if (!dataStr) return false;
      try {
        const [d, m, a] = dataStr.split('/').map(Number);
        return new Date(a, m - 1, d) < new Date().setHours(0, 0, 0, 0);
      } catch (e) {
        return false;
      }
    }

    function confirmarEntradaVencida() {
      document.getElementById('modal-vencimento').classList.remove('active');
      executarEnvio(pendente.tipo, pendente.qtd);
    }

    function cancelarEntradaVencida() {
      document.getElementById('modal-vencimento').classList.remove('active');
      qrCodeLido = null;
      document.getElementById('qr-result').textContent = 'Aponte para o Data Matrix';
      startScanner();
    }

    async function executarEnvio(tipo, quantidade) {
      mostrarStatus('Processando...', 'info');
      document.getElementById('btnEntrada').disabled = true;
      document.getElementById('btnSaida').disabled = true;

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ 
            action: 'registrar', 
            tipo, 
            qrCodeCompleto: qrCodeLido, 
            quantidade, 
            token: API_TOKEN 
          })
        }).then(r => r.json());

        mostrarStatus(res.mensagem, res.status === 'sucesso' ? 'sucesso' : 'erro');
        
        if (res.status === 'sucesso') {
          qrCodeLido = null;
          document.getElementById('quantidade').value = '';
          setTimeout(() => {
            document.getElementById('status').style.display = 'none';
            startScanner();
          }, 1500);
          carregarDados(true);
        }
      } catch (e) {
        mostrarStatus('Erro na conexão com o servidor.', 'erro');
      } finally {
        document.getElementById('btnEntrada').disabled = false;
        document.getElementById('btnSaida').disabled = false;
      }
    }

    function mostrarStatus(msg, tipo) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = `status-${tipo}`;
      status.style.display = 'block';
    }

    async function carregarDados(update = false) {
      if (!update) document.getElementById('loading-overlay').style.display = 'flex';
      
      try {
        const res = await fetch(`${WEB_APP_URL}?action=obter&token=${API_TOKEN}`).then(r => r.json());
        if (res.status === 'sucesso') {
          appData = res.dados;
          renderizarTudo();
        }
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
      } finally {
        document.getElementById('loading-overlay').style.display = 'none';
      }
    }

    function renderizarTudo() {
      const estoque = document.getElementById('corpo-tabela-estoque');
      estoque.innerHTML = (appData.estoque || []).map(i => 
        `<tr><td>${i.item}</td><td>${i.lote}</td><td>${i.validade}</td><td><strong>${i.total}</strong></td></tr>`
      ).join('');

      const mov = document.getElementById('corpo-tabela-movimentacoes');
      mov.innerHTML = (appData.movimentacoes || []).map(m => 
        `<tr><td>${m.dataHora.split(' ')[0]}</td><td>${m.tipo}</td><td>${m.item}</td><td>${m.lote}</td><td>${m.qtd}</td></tr>`
      ).join('');

      const alertas = document.getElementById('lista-alertas');
      if (!appData.alertas || appData.alertas.length === 0) {
        alertas.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--cor-texto-claro);">Nenhum alerta crítico.</div>';
      } else {
        alertas.innerHTML = appData.alertas.map(a => {
          const isV = a.tipo === 'Vencido';
          return `
            <div class="alert-item ${isV ? 'alert-vencido' : 'alert-7dias'}">
              <div class="alert-icon">${isV ? '🚫' : '⚠️'}</div>
              <div class="alert-info">
                <h4>${a.tipo}</h4>
                <p>${a.descricao}</p>
              </div>
            </div>`;
        }).join('');
      }
    }

    function filtrarTabela(id, input) {
      const f = input.value.toLowerCase();
      const rows = document.getElementById(id).getElementsByTagName('tr');
      for (let i = 1; i < rows.length; i++) {
        rows[i].style.display = rows[i].innerText.toLowerCase().includes(f) ? '' : 'none';
      }
    }

    function mostrarPagina(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      document.getElementById('nav-' + id).classList.add('active');
      
      if (id === 'registrar') {
        startScanner();
      } else {
        stopScanner();
      }
    }

    window.addEventListener('load', () => {
      carregarDados();
    });
  </script>
</body>
</html>
