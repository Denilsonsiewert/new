<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Controle de Estoque - WEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8" defer></script>
  <style>
    :root {
      --primary: #00579d; --success: #198754; --danger: #dc3545;
      --bg: #f0f2f5; --card: #fff; --text: #1f2937; --muted: #6b7280;
      --border: #e5e7eb; --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'Inter', system-ui, sans-serif; font-size: 16px;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      background: var(--card); padding: 12px 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      padding-top: max(12px, env(safe-area-inset-top, 12px));
    }
    header img { height: 36px; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--primary); }

    main { flex: 1; overflow-y: auto; padding: 16px; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
    h2 { margin: 0 0 16px; font-size: 1.2rem; font-weight: 600; text-align: center; }

    /* SCANNER ULTRA-RÁPIDO */
    #scanner-wrap { position: relative; width: 100%; max-width: 320px; margin: 0 auto 16px; background: #000; border-radius: 12px; overflow: hidden; }
    #reader { width: 100%; height: 100%; display: block; }
    #reader video { width: 100%; height: 100%; object-fit: cover; }
    
    .scan-guide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .scan-box {
      width: 180px; height: 180px; border: 3px solid rgba(25,135,84,0.8);
      border-radius: 8px; box-shadow: 0 0 0 999px rgba(0,0,0,0.3);
      transition: border-color 0.1s;
    }
    .scan-box.scanning { border-color: var(--primary); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .step-indicator {
      text-align: center; padding: 8px; margin-bottom: 12px; border-radius: 8px;
      font-weight: 600; font-size: 0.95rem; background: #f3f4f6;
      transition: background 0.2s;
    }
    .step-active { background: var(--primary); color: white; }
    .step-done { background: var(--success); color: white; }

    .result-line {
      display: flex; justify-content: space-between; padding: 10px 0;
      border-bottom: 1px solid var(--border); font-size: 0.9rem;
    }
    .result-line strong { color: var(--primary); }
    .result-line.sent { opacity: 0.6; }

    /* TOAST RÁPIDO */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: white; padding: 10px 20px;
      border-radius: 24px; font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; }

    nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
      display: flex; border-top: 1px solid var(--border); height: 60px; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-btn { flex: 1; border: none; background: none; color: var(--muted); font-weight: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn span { font-size: 1.3rem; }
  </style>
</head>
<body>
  <header>
    <img src="./logo-weg.png" alt="WEG">
    <h1>Leitura Rápida - Estoque</h1>
  </header>

  <main>
    <div class="card">
      <div id="stepInfo" class="step-indicator step-active">PASSO 1: Escaneie o ITEM</div>
      
      <div id="scanner-wrap">
        <div id="reader"></div>
        <div class="scan-guide"><div id="scanBox" class="scan-box scanning"></div></div>
      </div>

      <div id="scanData">
        <div class="result-line" id="lineItem"><span>Item:</span> <strong>—</strong></div>
        <div class="result-line" id="lineQty"><span>Quantidade:</span> <strong>—</strong></div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <nav>
    <button class="nav-btn active" onclick="showPage('scan')"><span>📷</span>Scanner</button>
    <button class="nav-btn" onclick="showPage('history')"><span>📋</span>Histórico</button>
    <button class="nav-btn" onclick="showPage('alerts')"><span>⚠️</span>Alertas</button>
  </nav>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbztT62x-sYOCIuv-CvKbN0rZfeDLa9KMpjoE0sFaqnu_fFs8yDErpwxU80_wJVH3c4tSA/exec';
    const API_TOKEN   = 'sk_ESTOQUE_7vQ2d9A4mX8pL5rB1tC6hN3zY0';

    let html5QrCode = null, videoTrack = null, isScanning = false;
    let scanState = { step: 1, item: '', qty: '' };
    let lastScanTs = 0;
    const SCAN_COOLDOWN = 400; // ms mínimo entre leituras

    const UI = {
      stepInfo: document.getElementById('stepInfo'),
      scanBox: document.getElementById('scanBox'),
      lineItem: document.getElementById('lineItem'),
      lineQty: document.getElementById('lineQty'),
      toast: document.getElementById('toast')
    };

    function toast(msg, type='info') {
      UI.toast.textContent = msg;
      UI.toast.style.background = type === 'success' ? '#198754' : type === 'error' ? '#dc3545' : 'rgba(0,0,0,0.85)';
      UI.toast.classList.add('show');
      setTimeout(() => UI.toast.classList.remove('show'), 1500);
    }

    /* === SCANNER PERSISTENTE E INSTANTÂNEO === */
    async function initScanner() {
      if (isScanning) return;
      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          {
            fps: 15,
            qrbox: { width: 180, height: 180 },
            disableFlip: true,
            formatsToSupport: [Html5QrcodeSupportedFormats.DATA_MATRIX],
            experimentalFeatures: { useBarCodeDetectorIfSupported: true }
          },
          onCodeDetected
        );
        isScanning = true;
        UI.scanBox.classList.add('scanning');
        
        // Aplica foco contínuo nativo uma vez só
        const video = document.querySelector('#reader video');
        videoTrack = video?.srcObject?.getVideoTracks?.()[0];
        if (videoTrack?.applyConstraints) {
          videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous', exposureMode: 'continuous' }] }).catch(()=>{});
        }
      } catch (e) {
        toast('Câmera indisponível', 'error');
        console.error(e);
      }
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().catch(()=>{});
        isScanning = false;
        UI.scanBox.classList.remove('scanning');
      }
    }

    function onCodeDetected(decodedText) {
      const now = Date.now();
      if (now - lastScanTs < SCAN_COOLDOWN) return; // Evita leituras duplas acidentais
      lastScanTs = now;

      // Vibração e som instantâneos
      navigator.vibrate?.(30);
      try { new AudioContext().createOscillator().connect(new GainNode(new AudioContext())).start().stop(0.1); } catch {}

      // Atualiza estado
      if (scanState.step === 1) {
        scanState.item = decodedText;
        scanState.step = 2;
        UI.lineItem.querySelector('strong').textContent = decodedText;
        UI.stepInfo.textContent = 'PASSO 2: Escaneie a QUANTIDADE';
        UI.stepInfo.className = 'step-indicator step-active';
        UI.scanBox.style.borderColor = '#00579d';
      } else if (scanState.step === 2) {
        scanState.qty = decodedText;
        scanState.step = 0; // 0 = pronto para enviar
        UI.lineQty.querySelector('strong').textContent = decodedText;
        UI.stepInfo.textContent = 'ENVIANDO...';
        UI.stepInfo.style.background = '#ffc107';
        UI.scanBox.style.borderColor = '#ffc107';
        sendToAPI();
      }
    }

    async function sendToAPI() {
      const payload = { action: 'registrar', tipo: 'Entrada', qrCodeCompleto: scanState.item, quantidade: scanState.qty, token: API_TOKEN };
      
      try {
        // Dispara em background, não bloqueia scanner
        const res = await fetch(WEB_APP_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (data.status === 'sucesso') {
          toast('✅ Registrado com sucesso!', 'success');
          UI.lineItem.classList.add('sent');
          UI.lineQty.classList.add('sent');
        } else {
          toast('⚠️ Erro: ' + data.mensagem, 'error');
        }
      } catch (e) {
        toast('❌ Falha na conexão', 'error');
      } finally {
        // Reset imediato para próximo ciclo
        setTimeout(resetForNext, 300);
      }
    }

    function resetForNext() {
      scanState = { step: 1, item: '', qty: '' };
      UI.lineItem.querySelector('strong').textContent = '—';
      UI.lineQty.querySelector('strong').textContent = '—';
      UI.lineItem.classList.remove('sent');
      UI.lineQty.classList.remove('sent');
      UI.stepInfo.textContent = 'PASSO 1: Escaneie o ITEM';
      UI.stepInfo.className = 'step-indicator step-active';
      UI.scanBox.style.borderColor = 'rgba(25,135,84,0.8)';
    }

    /* === NAVEGAÇÃO LEVE === */
    function showPage(page) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      if (page === 'scan') initScanner(); else stopScanner();
    }

    // Inicia automaticamente ao carregar
    window.addEventListener('load', initScanner);
    window.addEventListener('beforeunload', stopScanner);
    document.addEventListener('visibilitychange', () => document.hidden ? stopScanner() : initScanner());
  </script>
</body>
</html>
