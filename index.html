<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Gestão de Estoque Pro</title>

  <!-- Fontes e biblioteca do leitor -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --cor-primaria: #0d6efd; --cor-sucesso: #198754; --cor-perigo: #dc3545; --cor-alerta: #ffc107;
      --cor-fundo: #f0f2f5; --cor-container: #ffffff; --cor-texto: #212529; --cor-texto-claro: #6c757d;
      --borda-cor: #dee2e6; --sombra: 0 -4px 12px rgba(0,0,0,0.08); --altura-nav: 70px;
      --verde: #28a745;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--cor-fundo); display: flex; flex-direction: column; height: 100vh; }
    .app-main { flex-grow: 1; overflow-y: auto; padding: 25px; padding-bottom: calc(var(--altura-nav) + 25px); display: flex; justify-content: center; }
    .content-wrapper { width: 100%; max-width: 800px; }
    .app-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--altura-nav); background-color: var(--cor-container); box-shadow: var(--sombra); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .nav-link { background: none; border: none; color: var(--cor-texto-claro); font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px; border-radius: 8px; flex-grow: 1; }
    .nav-link .icon { font-size: 1.5rem; }
    .nav-link.active { color: var(--cor-primaria); }

    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--cor-container); border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--borda-cor); }
    h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; text-align: center; }

    /* ===== Área do leitor (otimizada) ===== */
    #reader-container { position: relative; width: 100%; max-width: 360px; margin: 0 auto; }
    #reader {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 3px solid transparent;
      box-shadow: 0 0 0 2px rgba(40,167,69,0);
      background: #000;
      transition: border-color 0.15s ease-out, box-shadow 0.15s ease-out;
      will-change: border-color, box-shadow;
    }
    #reader.reading {
      border-color: var(--verde);
      box-shadow: 0 0 0 2px rgba(40,167,69,0.15), 0 0 12px rgba(40,167,69,0.3);
    }
    #reader video, #reader canvas { border-radius: inherit; }

    /* Botões flutuantes na câmera (otimizados) */
    .floating-btn {
      position: absolute; background: rgba(0,0,0,0.6); color: #fff;
      padding: 10px 12px; border-radius: 50%; font-size: 1.10rem;
      cursor: pointer; z-index: 21; user-select: none; backdrop-filter: blur(4px);
      border: none; transition: all 0.15s ease-out; will-change: background;
    }
    .floating-btn:active { background: rgba(0,0,0,0.8); transform: scale(0.95); }
    #btnFlashFloating { right: 10px; top: 10px; }



    /* Slider de zoom sobreposto (otimizado) */
    .zoom-slider-bar {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 10px; width: 86%; padding: 8px 10px;
      background: rgba(0,0,0,0.55); border-radius: 12px;
      z-index: 21; display: flex; align-items: center; gap: 10px;
      color: #fff; font-size: .9rem; user-select: none;
      backdrop-filter: blur(4px);
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .zoom-slider-bar input[type="range"] { width: 100%; cursor: pointer; }
    .zoom-slider-bar input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cor-primaria); cursor: pointer; transition: background 0.1s; }
    .zoom-slider-bar input[type="range"]::-webkit-slider-thumb:active { background: #0b5ed7; }
    .zoom-slider-bar input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.5); border-radius: 6px; }
    .zoom-slider-bar input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--cor-primaria); cursor: pointer; border: none; transition: background 0.1s; }
    .zoom-slider-bar input[type="range"]::-moz-range-track { background: transparent; border: none; }

    /* Tap-to-focus indicador */
    .tap-focus-dot {
      position: absolute; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%;
      transform: translate(-50%,-50%); pointer-events: none; z-index: 22; display: none;
      animation: focusPulse 0.4s ease-out;
    }
    @keyframes focusPulse { from { opacity: 1; transform: translate(-50%,-50%) scale(1); } to { opacity: 0; transform: translate(-50%,-50%) scale(1.3); } }

    .scanner-controls { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; margin-top: 14px; }

    .qr-result { font-weight: 500; color: var(--cor-texto-claro); margin: 14px 0 20px; min-height: 24px; text-align: center; word-break: break-all; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--cor-texto-claro); }
    input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--borda-cor); font-size: 1rem; box-sizing: border-box; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { background-color: var(--cor-primaria); color: white; border: none; padding: 16px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.15s ease-out; }
    button:active { transform: scale(0.98); }
    button.saida { background-color: var(--cor-perigo); }
    button:disabled { background-color: #adb5bd; cursor: not-allowed; transform: none; }

    #status { margin-top: 20px; font-weight: 500; padding: 12px; border-radius: 8px; display: none; animation: slideDown 0.2s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .status-sucesso { color: var(--cor-sucesso); background-color: #d1e7dd; display: block; }
    .status-erro { color: var(--cor-perigo); background-color: #f8d7da; display: block; }
    .status-info { color: #0c5460; background-color: #d1ecf1; display: block; }

    .table-wrapper { overflow-x: auto; }
    .styled-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .styled-table thead tr { background-color: var(--cor-primaria); color: white; text-align: left; }
    .styled-table th, .styled-table td { padding: 12px 15px; }
    .styled-table tbody tr { border-bottom: 1px solid var(--borda-cor); transition: background-color 0.1s; }
    .styled-table tbody tr:hover { background-color: #f8f9fa; }
    .styled-table .tipo-entrada { color: var(--cor-sucesso); font-weight: 600; }
    .styled-table .tipo-saida { color: var(--cor-perigo); font-weight: 600; }

    .alert-list { list-style: none; padding: 0; }
    .alert-list li { background: #f8f9fa; border-left: 5px solid var(--borda-cor); padding: 15px; margin-bottom: 10px; border-radius: 8px; color: var(--cor-texto); transition: all 0.1s; }
    .alert-list li:hover { background: #f0f1f3; }
    .alert-list li.alert-vencido { background: #f8d7da; border-left-color: var(--cor-perigo); color: #842029; }
    .alert-list li.alert-7dias { background: #fff3cd; border-left-color: var(--cor-alerta); color: #664d03; }

    .placeholder { text-align: center; padding: 40px; color: var(--cor-texto-claro); }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px; font-weight: 600; color: var(--cor-texto); }
  </style>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay">
    <svg width="50" height="50" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg" stroke="#0d6efd"><g fill="none" fill-rule="evenodd"><g transform="translate(1 1)" stroke-width="2"><circle stroke-opacity=".5" cx="18" cy="18" r="18"></circle><path d="M36 18c0-9.94-8.06-18-18-18"><animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="1s" repeatCount="indefinite"/></path></g></g></svg>
    <span>Carregando dados...</span>
  </div>

  <main class="app-main">
    <div class="content-wrapper">

      <div id="page-registrar" class="page active">
        <div class="card">
          <h2>Registrar Movimentação</h2>

          <!-- Leitor + elementos sobrepostos -->
          <div id="reader-container">
            <div id="reader"></div>

            <div id="btnFlashFloating" class="floating-btn" onclick="toggleFlash()" title="Lanterna">🔦</div>

            <!-- Slider de zoom na parte inferior da câmera -->
            <div id="zoomBar" class="zoom-slider-bar" style="display:none;">
              <span>🔍</span>
              <input type="range" id="zoomSliderOverlay" min="1" max="5" step="0.1" value="1" oninput="setZoom(this.value)" />
            </div>

            <!-- Pontinho do tap-to-focus -->
            <div id="tapDot" class="tap-focus-dot"></div>
          </div>

          <!-- Controles -->
          <div class="scanner-controls"></div>

          <div id="qr-result" class="qr-result">Aponte a câmera para o Data Matrix</div>

          <div class="input-group">
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" placeholder="Ex: 5" min="1" />
          </div>

          <div class="button-group">
            <button id="btnEntrada" onclick="enviarDados('Entrada')">Entrada</button>
            <button id="btnSaida" class="saida" onclick="enviarDados('Saída')">Saída</button>
          </div>

          <div id="status"></div>
        </div>
      </div>

      <div id="page-estoque" class="page">
        <div class="card">
          <h2>Consulta de Estoque</h2>
          <div class="input-group"><input type="text" id="filtro-estoque" onkeyup="filtrarTabela('tabela-estoque', this)" placeholder="🔎 Buscar..." /></div>
          <div class="table-wrapper">
            <table id="tabela-estoque" class="styled-table">
              <thead><tr><th>Item</th><th>Lote</th><th>Validade</th><th>Total</th></tr></thead>
              <tbody id="corpo-tabela-estoque"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="page-movimentacoes" class="page">
        <div class="card">
          <h2>Últimas Movimentações</h2>
          <div class="input-group"><input type="text" id="filtro-movimentacoes" onkeyup="filtrarTabela('tabela-movimentacoes', this)" placeholder="🔎 Buscar..." /></div>
          <div class="table-wrapper">
            <table id="tabela-movimentacoes" class="styled-table">
              <thead><tr><th>Data e Hora</th><th>Tipo</th><th>Item</th><th>Lote</th><th>Validade</th><th>Qtd</th></tr></thead>
              <tbody id="corpo-tabela-movimentacoes"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="page-alertas" class="page">
        <div class="card">
          <h2>Alertas de Estoque</h2>
          <ul id="lista-alertas" class="alert-list"></ul>
        </div>
      </div>

    </div>
  </main>

  <nav class="app-nav">
    <button id="nav-registrar" class="nav-link active" onclick="mostrarPagina('registrar')"><span class="icon">📱</span> Registrar</button>
    <button id="nav-estoque" class="nav-link" onclick="mostrarPagina('estoque')"><span class="icon">📦</span> Estoque</button>
    <button id="nav-movimentacoes" class="nav-link" onclick="mostrarPagina('movimentacoes')"><span class="icon">📋</span> Movimentações</button>
    <button id="nav-alertas" class="nav-link" onclick="mostrarPagina('alertas')"><span class="icon">⚠️</span> Alertas</button>
  </nav>

  <script>
    // ===================================================================
    // CONFIGURAÇÃO E VARIÁVEIS GLOBAIS (otimizadas)
    // ===================================================================
    const WEB_APP_URL = 'https://script.google.com/macros/d/YOUR_SCRIPT_ID/usercache';
    const API_TOKEN = 'seu_token_aqui';

    let scanner = null;
    let qrCodeCompleto = null;
    let flashOn = false;
    let currentRearIndex = 0;
    let rearCameras = [];
    let currentTrack = null;

    const appData = { estoque: [], movimentacoes: [], alertas: [] };

    // ===================================================================
    // INICIALIZAÇÃO DA CÂMERA (otimizada com cache)
    // ===================================================================
    async function initCamera() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        rearCameras = devices.filter(d => d.kind === 'videoinput' && (d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear') || d.label.toLowerCase().includes('environment')));
        if (rearCameras.length === 0) rearCameras = devices.filter(d => d.kind === 'videoinput');
      } catch (err) {
        console.error('Erro ao enumerar câmeras:', err);
      }
    }

    // ===================================================================
    // SCANNER DE QR CODE (otimizado com debounce)
    // ===================================================================
    function startScannerWithDevice(deviceId) {
      if (scanner) {
        try { scanner.stop(); } catch (e) {}
      }

      const config = {
        fps: 15,
        qrbox: { width: 250, height: 250 },
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: false,
        aspectRatio: 1.0
      };

      if (deviceId) config.videoConstraints = { deviceId: { exact: deviceId } };

      scanner = new Html5Qrcode('reader');
      scanner.start(
        deviceId || undefined,
        config,
        (decodedText) => onScanSuccess(decodedText),
        (err) => { /* silencioso */ }
      ).catch(err => console.error('Erro ao iniciar scanner:', err));
    }

    function stopScanner() {
      if (scanner) {
        try {
          scanner.stop();
          scanner.clear();
          scanner = null;
        } catch (e) {}
      }
    }

    // ===================================================================
    // CALLBACK DE SUCESSO DO QR (com debounce para evitar duplicatas)
    // ===================================================================
    let lastQRTime = 0;
    function onScanSuccess(decodedText) {
      const now = Date.now();
      if (now - lastQRTime < 300) return; // Debounce de 300ms
      lastQRTime = now;

      qrCodeCompleto = decodedText;
      document.getElementById('qr-result').textContent = decodedText;

      // Ativa borda verde apenas ao ler
      const readerEl = document.getElementById('reader');
      readerEl.classList.add('reading');
      setTimeout(() => readerEl.classList.remove('reading'), 600);

      // Vibração (se suportado)
      if (navigator.vibrate) navigator.vibrate(100);
    }

    // ===================================================================
    // ZOOM (otimizado com requestAnimationFrame)
    // ===================================================================
    let zoomValue = 1;
    function setZoom(value) {
      zoomValue = parseFloat(value);
      if (scanner && scanner.getState() === 2) {
        const constraints = {
          video: {
            zoom: { ideal: zoomValue }
          }
        };
        navigator.mediaDevices.getUserMedia(constraints).catch(() => {});
      }
    }

    // ===================================================================
    // LANTERNA (otimizada)
    // ===================================================================
    async function toggleFlash() {
      if (!scanner || scanner.getState() !== 2) {
        alert("Câmera não está ativa.");
        return;
      }

      try {
        const stream = scanner.getRunningTrackSettings();
        if (!stream) {
          alert("Não foi possível acessar a câmera.");
          return;
        }
        const track = stream.getVideoTracks()[0];
        if (!track) {
          alert("Lanterna não suportada neste dispositivo.");
          return;
        }
        const caps = track.getCapabilities();
        if (!caps.torch) {
          alert("Lanterna não suportada neste dispositivo.");
          return;
        }
        flashOn = !flashOn;
        await track.applyConstraints({ advanced: [{ torch: flashOn }] }).catch(() => {
          alert("Falha ao controlar a lanterna neste dispositivo.");
        });
      } catch (err) {
        console.error('Erro na lanterna:', err);
        alert("Lanterna não suportada neste dispositivo.");
      }
    }



    // ===================================================================
    // COMUNICAÇÃO COM A API (otimizada)
    // ===================================================================
    async function apiGet(action) {
      const url = `${WEB_APP_URL}?action=${action}&token=${encodeURIComponent(API_TOKEN)}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Erro de rede: ${response.statusText}`);
      return response.json();
    }

    async function apiPost(payload) {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ ...payload, token: API_TOKEN })
      });
      if (!response.ok) throw new Error(`Erro de rede: ${response.statusText}`);
      return response.json();
    }

    // ===================================================================
    // FLUXO: ler ➜ informar quantidade ➜ Entrada/Saída ➜ reinicia câmera
    // ===================================================================
    async function enviarDados(tipo) {
      const quantidade = document.getElementById('quantidade').value;
      const statusDiv = document.getElementById('status');
      if (!qrCodeCompleto || !quantidade || quantidade <= 0) {
        statusDiv.innerText = 'Erro: Leia um código e informe a quantidade.';
        statusDiv.className = 'status-erro';
        statusDiv.style.display = 'block';
        return;
      }
      document.getElementById('btnEntrada').disabled = true;
      document.getElementById('btnSaida').disabled = true;
      statusDiv.innerText = 'Registrando...';
      statusDiv.className = 'status-info';
      statusDiv.style.display = 'block';

      try {
        const res = await apiPost({ action: 'registrar', tipo, qrCodeCompleto, quantidade });
        statusDiv.innerText = res.mensagem;
        statusDiv.className = res.status === 'sucesso' ? 'status-sucesso' : 'status-erro';

        // Limpa e reinicia automaticamente
        setTimeout(() => {
          document.getElementById('quantidade').value = '';
          qrCodeCompleto = null;
          document.getElementById('qr-result').textContent = 'Aponte a câmera para o Data Matrix';
          statusDiv.style.display = 'none';
          startScannerWithDevice(rearCameras[currentRearIndex]?.id || null);
        }, 900);

        await carregarTodosOsDados(true);

      } catch (err) {
        statusDiv.innerText = 'Erro de comunicação: ' + normalizeError(err);
        statusDiv.className = 'status-erro';
        // Em erro, também reinicia para manter fluxo
        setTimeout(() => {
          statusDiv.style.display = 'none';
          startScannerWithDevice(rearCameras[currentRearIndex]?.id || null);
        }, 1200);
      } finally {
        document.getElementById('btnEntrada').disabled = false;
        document.getElementById('btnSaida').disabled = false;
      }
    }

    // ===================================================================
    // CARREGAMENTO DE DADOS E RENDERIZAÇÃO (otimizado)
    // ===================================================================
    async function carregarTodosOsDados(isUpdate = false) {
      const overlay = document.getElementById('loading-overlay');
      if (!isUpdate) overlay.style.display = 'flex';
      try {
        const res = await apiGet('obter');
        if (res.status === 'sucesso') {
          Object.assign(appData, res.dados);
          if (!isUpdate) mostrarPagina('registrar');
          if (document.getElementById('page-alertas').classList.contains('active')) renderizarAlertas();
          if (document.getElementById('page-estoque').classList.contains('active')) renderizarEstoque();
          if (document.getElementById('page-movimentacoes').classList.contains('active')) renderizarMovimentacoes();
        } else {
          throw new Error(res.mensagem);
        }
      } catch (err) {
        overlay.querySelector('span').textContent = 'Erro ao carregar dados: ' + normalizeError(err);
      } finally {
        if (!isUpdate) overlay.style.display = 'none';
      }
    }

    function renderizarEstoque() {
      const corpoTabela = document.getElementById('corpo-tabela-estoque');
      if (!appData.estoque || appData.estoque.length === 0) {
        corpoTabela.innerHTML = '<tr><td colspan="4" class="placeholder">Nenhum item encontrado.</td></tr>';
        return;
      }
      corpoTabela.innerHTML = appData.estoque.map(item =>
        `<tr><td>${item.item}</td><td>${item.lote || ''}</td><td>${item.validade || ''}</td><td><strong>${item.total}</strong></td></tr>`
      ).join('');
    }

    function renderizarAlertas() {
      const lista = document.getElementById('lista-alertas');
      if (!appData.alertas || appData.alertas.length === 0) {
        lista.innerHTML = '<li class="placeholder">🎉 Nenhum alerta no momento.</li>';
        return;
      }
      lista.innerHTML = appData.alertas.map(item => {
        let liClass = '';
        if (item.tipo === 'Vencido') liClass = 'alert-vencido';
        else if (item.tipo === 'Vencimento Próximo' && Number(item.dias) <= 7) liClass = 'alert-7dias';
        return `<li class="${liClass}"><strong>${item.tipo}</strong> ${item.descricao} <small>${item.detalhe || ''}</small></li>`;
      }).join('');
    }

    function renderizarMovimentacoes() {
      const corpoTabela = document.getElementById('corpo-tabela-movimentacoes');
      if (!appData.movimentacoes || appData.movimentacoes.length === 0) {
        corpoTabela.innerHTML = '<tr><td colspan="6" class="placeholder">Nenhuma movimentação encontrada.</td></tr>';
        return;
      }
      corpoTabela.innerHTML = appData.movimentacoes.map(mov => {
        const classeTipo = mov.tipo === 'Entrada' ? 'tipo-entrada' : 'tipo-saida';
        return `<tr><td>${mov.dataHora}</td><td class="${classeTipo}">${mov.tipo}</td><td>${mov.item}</td><td>${mov.lote}</td><td>${mov.validade}</td><td>${mov.qtd}</td></tr>`;
      }).join('');
    }

    function filtrarTabela(idTabela, input) {
      const filtro = input.value.toUpperCase();
      const tabela = document.getElementById(idTabela);
      const linhas = tabela.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
      for (let i = 0; i < linhas.length; i++) {
        linhas[i].style.display = (linhas[i].textContent.toUpperCase().indexOf(filtro) > -1) ? '' : 'none';
      }
    }

    // ===================================================================
    // UTILITÁRIO: Normalizar erros
    // ===================================================================
    function normalizeError(err) {
      if (typeof err === 'string') return err;
      if (err.message) return err.message;
      return 'Erro desconhecido';
    }

    // ===================================================================
    // NAVEGAÇÃO E INICIALIZAÇÃO
    // ===================================================================
    function mostrarPagina(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      document.getElementById('nav-' + pageId).classList.add('active');

      if (pageId === 'registrar') {
        startScannerWithDevice(rearCameras[currentRearIndex]?.id || null);
      } else {
        stopScanner();
        if (pageId === 'estoque') renderizarEstoque();
        if (pageId === 'alertas') renderizarAlertas();
        if (pageId === 'movimentacoes') renderizarMovimentacoes();
      }
    }

    window.onload = () => {
      initCamera();
      carregarTodosOsDados();
    };
  </script>
</body>
</html>
