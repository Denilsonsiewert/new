<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let html5QrCode;
let currentTrack;
let flashOn = false;
let lastResult = "";
let lastScanTime = 0;

async function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  const cameras = await Html5Qrcode.getCameras();
  const cameraId =
    cameras.find(c => c.label.toLowerCase().includes("back"))?.id
    || cameras[0].id;

  const config = {
    fps: 40, // mais rápido
    qrbox: { width: 250, height: 250 }, // menor = mais rápido
    aspectRatio: 1.0,
    disableFlip: true,
    formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX ],
    videoConstraints: {
      facingMode: "environment",
      width: { ideal: 1280 },   // ⚡ mais rápido que 1920
      height: { ideal: 720 },
      focusMode: "continuous"
    }
  };

  await html5QrCode.start(
    cameraId,
    config,
    onScanSuccess
  );

  const videoElem = document.querySelector("video");
  currentTrack = videoElem.srcObject.getVideoTracks()[0];

  applyAdvancedFocus();
}

function onScanSuccess(decodedText) {

  const now = Date.now();

  // Evita leitura repetida muito rápida
  if (decodedText === lastResult && now - lastScanTime < 1000) {
    return;
  }

  lastResult = decodedText;
  lastScanTime = now;

  document.getElementById("result").innerText =
    "Detectado: " + decodedText;
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop();
  }
}

async function applyAdvancedFocus() {

  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  let constraints = { advanced: [] };

  // 🔥 Foco contínuo
  if (capabilities.focusMode) {
    constraints.advanced.push({ focusMode: "continuous" });
  }

  // 🔥 Força foco manual para infinito (alguns celulares focam melhor assim)
  if (capabilities.focusDistance) {
    constraints.advanced.push({
      focusDistance: capabilities.focusDistance.max
    });
  }

  // 🔥 Ajuste automático de exposição
  if (capabilities.exposureMode) {
    constraints.advanced.push({ exposureMode: "continuous" });
  }

  if (constraints.advanced.length > 0) {
    await currentTrack.applyConstraints(constraints);
  }

  // Ajusta limites do zoom
  if (capabilities.zoom) {
    document.getElementById("zoomSlider").max = capabilities.zoom.max;
    document.getElementById("zoomSlider").min = capabilities.zoom.min;
  }
}

async function setZoom(value) {
  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();
  if (capabilities.zoom) {
    await currentTrack.applyConstraints({
      advanced: [{ zoom: parseFloat(value) }]
    });
  }
}

async function toggleFlash() {
  if (!currentTrack) return;

  const capabilities = currentTrack.getCapabilities();

  if (!capabilities.torch) {
    alert("Lanterna não suportada neste dispositivo.");
    return;
  }

  flashOn = !flashOn;

  await currentTrack.applyConstraints({
    advanced: [{ torch: flashOn }]
  });
}

</script>
